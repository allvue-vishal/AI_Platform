<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ repo_name }} — AutoDoc</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d1117; --sidebar-bg: #161b22; --text: #e6edf3;
            --text-muted: #8b949e; --accent: #58a6ff; --border: #30363d;
            --code-bg: #1c2128; --hover: #1f2937;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
               background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
        #sidebar {
            width: 280px; min-width: 280px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border); padding: 20px 0; overflow-y: auto;
            position: fixed; top: 0; bottom: 0; left: 0;
        }
        #sidebar h2 { padding: 0 20px 16px; font-size: 16px; color: var(--accent); border-bottom: 1px solid var(--border); margin-bottom: 8px; }
        #sidebar ul { list-style: none; }
        #sidebar li a {
            display: block; padding: 8px 20px; color: var(--text-muted);
            text-decoration: none; font-size: 14px; transition: all 0.15s;
        }
        #sidebar li a:hover, #sidebar li a.active { color: var(--text); background: var(--hover); }
        #sidebar li a.active { border-left: 3px solid var(--accent); }
        #content { margin-left: 280px; flex: 1; padding: 40px 60px; max-width: 900px; }
        #content h1 { font-size: 28px; margin-bottom: 16px; }
        #content h2 { font-size: 22px; margin-top: 32px; margin-bottom: 12px; color: var(--accent); }
        #content h3 { font-size: 18px; margin-top: 24px; margin-bottom: 8px; }
        #content p { line-height: 1.7; margin-bottom: 12px; }
        #content ul, #content ol { margin-left: 24px; margin-bottom: 12px; }
        #content li { margin-bottom: 4px; line-height: 1.6; }
        #content code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        #content pre { background: var(--code-bg); padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
        #content pre code { background: none; padding: 0; }
        #content table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
        #content th, #content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
        #content th { background: var(--sidebar-bg); }
        #content a { color: var(--accent); }
        .mermaid { background: #fff; padding: 16px; border-radius: 8px; margin: 16px 0; }
        #search { width: calc(100% - 40px); margin: 0 20px 12px; padding: 8px 12px;
                  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
                  color: var(--text); font-size: 13px; }
        #search:focus { outline: none; border-color: var(--accent); }
        .meta { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; }
    </style>
</head>
<body>
    <nav id="sidebar">
        <h2>{{ repo_name }}</h2>
        <input type="text" id="search" placeholder="Search modules..." autocomplete="off">
        <ul id="nav-list">
            <li><a href="#" data-page="overview" class="active">Overview</a></li>
            {% for module_name in module_names %}
            <li><a href="#" data-page="{{ module_name }}">{{ module_name }}</a></li>
            {% endfor %}
        </ul>
    </nav>
    <main id="content">
        <div class="meta">Generated by AutoDoc Agent | {{ generated_at }}</div>
        <div id="doc-content"></div>
    </main>
    <script>
        const docs = {{ docs_json | safe }};
        const navLinks = document.querySelectorAll('#nav-list a');
        const contentDiv = document.getElementById('doc-content');
        const searchInput = document.getElementById('search');

        function renderPage(page) {
            const md = docs[page] || '# Not Found';
            contentDiv.innerHTML = marked.parse(md);
            document.querySelectorAll('#content pre code').forEach(block => {
                if (block.className.includes('language-mermaid') || block.parentElement.previousElementSibling?.textContent?.includes('mermaid')) {
                    const pre = block.parentElement;
                    const div = document.createElement('div');
                    div.className = 'mermaid';
                    div.textContent = block.textContent;
                    pre.replaceWith(div);
                }
            });
            contentDiv.querySelectorAll('pre code').forEach(block => {
                const text = block.textContent.trim();
                if (text.startsWith('graph ') || text.startsWith('flowchart ') || text.startsWith('sequenceDiagram') || text.startsWith('classDiagram')) {
                    const pre = block.parentElement;
                    const div = document.createElement('div');
                    div.className = 'mermaid';
                    div.textContent = text;
                    pre.replaceWith(div);
                }
            });
            mermaid.run();
            navLinks.forEach(l => l.classList.toggle('active', l.dataset.page === page));
        }

        navLinks.forEach(link => {
            link.addEventListener('click', e => { e.preventDefault(); renderPage(link.dataset.page); });
        });

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.toLowerCase();
            document.querySelectorAll('#nav-list li').forEach(li => {
                li.style.display = li.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        });

        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
        renderPage('overview');
    </script>
</body>
</html>
